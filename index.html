<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internet Speed Test</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <canvas id="particles-canvas"></canvas>
    <div class="container">
        <header>
            <div class="logo">FAST<span class="dot">.</span></div>
            <div class="settings-icon">
                <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"
                    stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path
                        d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z">
                    </path>
                </svg>
            </div>
        </header>

        <main>
            <div class="speed-display">
                <div class="metrics" id="download-metrics">
                    <span class="speed-value" id="download-speed">0</span>
                    <span class="speed-unit">Mbps</span>
                </div>
                <!-- Status indicator -->
                <div class="status-indicator">
                    <div class="spinner active" id="spinner"></div>
                </div>
            </div>

            <button class="show-more-btn" id="show-more-btn">
                <span>Show more info</span>
                <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"
                    stroke-linecap="round" stroke-linejoin="round" class="chevron-down" id="chevron">
                    <polyline points="6 9 12 15 18 9"></polyline>
                </svg>
            </button>

            <div class="more-info" id="more-info">
                <div class="info-grid">
                    <div class="info-item">
                        <div class="info-label">Latency</div>
                        <div class="info-value">
                            <span class="value" id="latency-unloaded">-</span>
                            <span class="unit">ms</span>
                        </div>
                        <div class="sub-label">Unloaded</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">Upload</div>
                        <div class="info-value">
                            <span class="value" id="upload-speed">-</span>
                            <span class="unit">Mbps</span>
                        </div>
                    </div>
                </div>

                <div class="action-buttons">
                    <button class="restart-btn" id="restart-btn" disabled>
                        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2"
                            fill="none" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.59-9.5l1.75 1.93"></path>
                        </svg>
                    </button>
                </div>
            </div>

            <div class="watermark">
                Powered by Cloudflare API
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>

</html>
